<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu Landing Page</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />
</head>
<body>

    <div class="landing-container">
        
        <section class="left-section">
            <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" alt="Pokemon Logo" class="logo">
            
            <div class="content">
                <p class="subtitle">Pokemon Gen I</p>
                <h1 class="title">Pikachu</h1>
                <p class="description">
                    Pikachu is an Electric-type Pokémon introduced in Generation I. Pikachu are small, chubby, and incredibly cute mouse-like Pokémon. They are almost completely covered by yellow fur.
                </p>
                
                <div class="slider-indicator">
                    <span class="slider-line"></span>
                    <span>01 / 08</span>
                </div>
            </div>

            
            <svg class="watermark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" stroke="#000" stroke-width="6" fill="none" />
                <path d="M 5 50 Q 50 50 95 50" stroke="#000" stroke-width="6" fill="none" />
                <circle cx="50" cy="50" r="14" stroke="#000" stroke-width="6" fill="#fdd400" />
                <circle cx="50" cy="50" r="6" stroke="#000" stroke-width="0" fill="#000" />
            </svg>
        </section>

        
        <section class="right-section">
            
            <div class="menu-btn">
                <i class="ri-menu-3-line"></i>
            </div>

            
            <div class="nav-dots">
                <span class="dot active"></span>
                
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
        </section>

        <img src="0de22b65efe5c19abd0cfea6efda67e5-removebg-preview.png" alt="Pikachu" class="hero-image">

    </div>
</body>
</html>
